name: Complete CI pipeline

on: 
  workflow_dispatch:
  push:
    branches: main

jobs:
  # JOB 1: Docker Build & Push
  docker:
    runs-on: [self-hosted, Linux]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: udayamoorthi98 
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push
        run: |
          docker build -f Dockerfile.distroless -t udayamoorthi98/nodeapp:${{ env.SHORT_SHA }} .
          docker push udayamoorthi98/nodeapp:${{ env.SHORT_SHA }}

  # JOB 2: SonarQube Analysis (Runs only if Docker succeeds)
  sonar:
    runs-on: [self-hosted, Linux]
    needs: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=NodeJS_App1
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          # Fix for ngrok landing page error
          SONAR_SCANNER_OPTS: "-Dngrok-skip-browser-warning=true"



