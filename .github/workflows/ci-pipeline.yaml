name: Complete CI pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request: 
    branches: [main]

jobs:
  sonar:
    runs-on: [self-hosted, wsl-linux]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          args: >
            -Dsonar.projectKey=NodeJS-CI-Pipeline
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker:
    runs-on: [self-hosted, wsl-linux]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -f Dockerfile.distroless -t dockerfile-distroless .

      - name: Set Docker tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
        
      - name: Tag Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker tag dockerfile-distroless ${{ secrets.DOCKER_USERNAME }}/nodeapp:$SHORT_SHA

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nodeapp:$SHORT_SHA  
